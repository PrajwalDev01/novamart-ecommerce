<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaMart | Your Everything Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/main/webapp/css/style.css">
    <style>
        /* Embedded CSS variables and inline style additions for cart/details */
        .cart-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        .cart-table th {
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
        }
        .cart-table td {
            padding: 2rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }
        .cart-img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
        }
        .cart-summary {
            background: var(--surface);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-top: 3rem;
            max-width: 400px;
            margin-left: auto;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text);
        }
        /* Product Details Styling */
        .product-details-container {
            display: flex;
            gap: 4rem;
            margin-top: 2rem;
            align-items: flex-start;
        }
        .details-gallery {
            flex: 1;
            max-width: 500px;
        }
        .details-img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .details-info {
            flex: 1;
        }
        .details-info h2 {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .details-cat {
            display: inline-block;
            background: var(--light-gray);
            color: var(--text-muted);
            padding: 0.35rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .details-price {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }
        .details-desc {
            color: var(--text-muted);
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }
        .details-specs {
            background: var(--light-gray);
            padding: 1.5rem;
            border-radius: 15px;
            margin-bottom: 2rem;
        }
        .details-specs h4 {
            margin-bottom: 0.75rem;
            color: var(--primary);
        }
        .details-specs p {
            font-size: 0.95rem;
            color: var(--text);
            white-space: pre-line;
        }
        .details-actions {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .variant-select {
            padding: 0.85rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--surface);
            font-weight: 600;
            color: var(--text);
            outline: none;
            cursor: pointer;
        }
        /* Category Filters Active state */
        .nav-links a.active-cat {
            color: var(--accent) !important;
            border-bottom: 2px solid var(--accent) !important;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo"><a href="#home" style="text-decoration: none; color: inherit;">NovaMart</a></div>
        
        <div class="search-container">
            <div class="search-form">
                <input type="text" id="search-input" placeholder="Search products, brands and more..." class="search-input">
                <button id="search-btn" class="search-btn">Search</button>
            </div>
        </div>

        <ul class="nav-links">
            <li><a href="#home" id="nav-all">All</a></li>
            <li><a href="#home?category=1" id="nav-cat-1">Fashion</a></li>
            <li><a href="#home?category=2" id="nav-cat-2">Electronics</a></li>
            <li><a href="#home?category=3" id="nav-cat-3">Home & Living</a></li>
            <li>
                <a href="#cart" id="nav-cart">Cart
                    <span class="cart-badge" id="cart-count-badge" style="display: none;">0</span>
                </a>
            </li>
            <li id="nav-auth-container">
                <a href="#login" id="nav-login">Login</a>
            </li>
        </ul>
    </nav>

    <!-- Dynamic Container -->
    <div id="view-container"></div>

    <footer>
        <p>&copy; 2026 NovaMart. All rights reserved.</p>
    </footer>

    <!-- Client-Side Routing and State Script -->
    <script>
        // Database
        const products = [
            {
                id: 1,
                name: "SanDisk Portable SSD",
                description: "High-speed portable solid state storage. Perfect for storing backups, raw photos, videos, and game files on the go.",
                price: 5999.00,
                categoryId: 2,
                categoryName: "Electronics",
                imageUrl: "https://m.media-amazon.com/images/I/712v5v63bfL._SL1500_.jpg",
                specifications: "Capacity: 2TB\nInterface: USB 3.2 Gen 2\nConnector: USB-C\nSpeed: Up to 1050 MB/s"
            },
            {
                id: 2,
                name: "SanDisk Extreme Pro 2TB Portable SSD",
                description: "Get powerful NVMe solid state performance featuring 2000MB/s read/write speeds in a portable drive that’s reliable enough to take on any adventure.",
                price: 19999.00,
                categoryId: 2,
                categoryName: "Electronics",
                imageUrl: "https://www.bhphotovideo.com/images/images1500x1500/sandisk_sdssde80_2t00_a25_extremepro_2tb_portable_ssd_1487011.jpg",
                specifications: "Capacity: 2TB\nInterface: USB 3.2 Gen 2x2\nConnector: USB-C\nCompatibility: Windows & Mac\nDimensions: 4.34\" x 2.26\" x 0.4\""
            },
            {
                id: 3,
                name: "Premium Designer Denim Jacket",
                description: "A timeless, classic denim jacket crafted from high-quality rigid cotton. Features a comfortable relaxed fit, dual chest pockets, and copper buttons.",
                price: 3499.00,
                categoryId: 1,
                categoryName: "Fashion",
                imageUrl: "https://images.unsplash.com/photo-1576995853123-5a10305d93c0?auto=format&fit=crop&q=80&w=600",
                specifications: "Material: 100% Cotton Denim\nFit: Relaxed\nWash: Medium Indigo Stone Wash\nCare: Machine washable"
            },
            {
                id: 4,
                name: "Minimalist Ceramic Vase Set",
                description: "Add a touch of contemporary elegance to your home space with this set of three matte ceramic vases. Styled for simple floral additions or solo counter displays.",
                price: 1899.00,
                categoryId: 3,
                categoryName: "Home & Living",
                imageUrl: "https://images.unsplash.com/photo-1578500494198-246f612d3b3d?auto=format&fit=crop&q=80&w=600",
                specifications: "Material: Glazed Stoneware\nHeights: Small (15cm), Medium (22cm), Large (28cm)\nFinish: Soft Sand Matte"
            }
        ];

        // State Management
        let cart = JSON.parse(localStorage.getItem('novamart_cart')) || [];
        let user = JSON.parse(localStorage.getItem('novamart_user')) || null;

        function saveState() {
            localStorage.setItem('novamart_cart', JSON.stringify(cart));
            localStorage.setItem('novamart_user', JSON.stringify(user));
            updateNavBar();
        }

        function updateNavBar() {
            // Cart badge
            const badge = document.getElementById('cart-count-badge');
            const totalCount = cart.reduce((acc, item) => acc + item.quantity, 0);
            if (totalCount > 0) {
                badge.textContent = totalCount;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }

            // Authentication Container
            const authContainer = document.getElementById('nav-auth-container');
            if (user) {
                authContainer.innerHTML = `<a href="#logout" id="nav-logout" style="color: var(--accent);">Logout (${user.name})</a>`;
                document.getElementById('nav-logout').addEventListener('click', (e) => {
                    e.preventDefault();
                    user = null;
                    saveState();
                    window.location.hash = '#home';
                    renderView();
                });
            } else {
                authContainer.innerHTML = `<a href="#login" id="nav-login">Login</a>`;
            }

            // Highlight category navigation
            const hash = window.location.hash;
            document.querySelectorAll('.nav-links a').forEach(link => link.classList.remove('active-cat'));
            
            if (hash.includes('category=1')) {
                document.getElementById('nav-cat-1').classList.add('active-cat');
            } else if (hash.includes('category=2')) {
                document.getElementById('nav-cat-2').classList.add('active-cat');
            } else if (hash.includes('category=3')) {
                document.getElementById('nav-cat-3').classList.add('active-cat');
            } else if (hash === '' || hash === '#home' || hash.includes('search=')) {
                document.getElementById('nav-all').classList.add('active-cat');
            } else if (hash === '#cart') {
                document.getElementById('nav-cart').classList.add('active-cat');
            }
        }

        // Views Router
        function renderView() {
            const container = document.getElementById('view-container');
            const hash = window.location.hash || '#home';
            
            updateNavBar();

            if (hash.startsWith('#home') || hash === '') {
                // Home view
                const params = new URLSearchParams(hash.includes('?') ? hash.split('?')[1] : '');
                const categoryId = params.get('category');
                const searchQuery = params.get('search');

                let filteredProducts = products;
                if (categoryId) {
                    filteredProducts = products.filter(p => p.categoryId == categoryId);
                }
                if (searchQuery) {
                    filteredProducts = products.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.description.toLowerCase().includes(searchQuery.toLowerCase()));
                }

                let productsHtml = '';
                if (filteredProducts.length === 0) {
                    productsHtml = `<div style="text-align: center; grid-column: 1/-1; padding: 4rem;"><p style="font-size: 1.25rem; color: var(--text-muted);">No products found matching your request.</p></div>`;
                } else {
                    filteredProducts.forEach(p => {
                        productsHtml += `
                            <div class="product-card">
                                <img src="${p.imageUrl}" alt="${p.name}" class="product-image">
                                <div class="product-info">
                                    <h3>${p.name}</h3>
                                    <p class="product-price">₹${p.price.toLocaleString('en-IN')}</p>
                                    <a href="#product?id=${p.id}" class="btn" style="margin-top: 1rem; padding: 0.6rem 1.5rem; font-size: 0.9rem; border-radius: 50px; text-align: center; display: block;">View Details</a>
                                </div>
                            </div>
                        `;
                    });
                }

                const heroHtml = searchQuery ? '' : `
                    <header class="hero">
                        <div class="hero-content">
                            <h1>Modern Style meets <br> Smart Technology.</h1>
                            <p>Explore a curated selection of fashion and tech essentials. Quality meets convenience at NovaMart.</p>
                            <a href="#shop" class="btn">Explore Now</a>
                        </div>
                    </header>
                `;

                container.innerHTML = `
                    ${heroHtml}
                    <main class="container" id="shop">
                        <h2 class="section-title">
                            ${searchQuery ? `Search Results for "${searchQuery}"` : categoryId ? `${products.find(p => p.categoryId == categoryId).categoryName} Collection` : 'Latest Arrivals'}
                        </h2>
                        <div class="product-grid">
                            ${productsHtml}
                        </div>
                    </main>
                `;
            } 
            else if (hash.startsWith('#product')) {
                // Product Details view
                const params = new URLSearchParams(hash.split('?')[1]);
                const id = params.get('id');
                const p = products.find(prod => prod.id == id);

                if (!p) {
                    container.innerHTML = `<div class="container" style="text-align:center; padding: 5rem;"><h2 class="section-title">Product Not Found</h2><a href="#home" class="btn">Back to Shop</a></div>`;
                    return;
                }

                container.innerHTML = `
                    <div class="container">
                        <div class="product-details-container">
                            <div class="details-gallery">
                                <img src="${p.imageUrl}" alt="${p.name}" class="details-img">
                            </div>
                            <div class="details-info">
                                <span class="details-cat">${p.categoryName}</span>
                                <h2>${p.name}</h2>
                                <p class="details-price">₹${p.price.toLocaleString('en-IN')}</p>
                                <p class="details-desc">${p.description}</p>
                                
                                <div class="details-specs">
                                    <h4>Technical Specifications</h4>
                                    <p>${p.specifications}</p>
                                </div>

                                <div class="details-actions">
                                    <select id="size-select" class="variant-select">
                                        <option value="Standard">Standard Size</option>
                                        ${p.categoryId == 1 ? `
                                            <option value="S">Small (S)</option>
                                            <option value="M">Medium (M)</option>
                                            <option value="L">Large (L)</option>
                                        ` : ''}
                                    </select>
                                    <button id="add-to-cart-btn" class="btn">Add to Selection</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                document.getElementById('add-to-cart-btn').addEventListener('click', () => {
                    const size = document.getElementById('size-select').value;
                    const existing = cart.find(item => item.id == p.id && item.size === size);
                    if (existing) {
                        existing.quantity += 1;
                    } else {
                        cart.push({
                            id: p.id,
                            name: p.name,
                            price: p.price,
                            imageUrl: p.imageUrl,
                            size: size,
                            quantity: 1
                        });
                    }
                    saveState();
                    alert(`${p.name} added to cart!`);
                    window.location.hash = '#cart';
                });
            } 
            else if (hash === '#cart') {
                // Cart view
                if (cart.length === 0) {
                    container.innerHTML = `
                        <div class="container" style="text-align: center; padding: 6rem 1rem;">
                            <h2 class="section-title">Your Cart is Empty</h2>
                            <p style="color: var(--text-muted); margin-bottom: 2rem;">It looks like you haven't made a selection yet.</p>
                            <a href="#home" class="btn">Explore Products</a>
                        </div>
                    `;
                    return;
                }

                let cartRows = '';
                let total = 0;
                cart.forEach((item, index) => {
                    const subtotal = item.price * item.quantity;
                    total += subtotal;
                    cartRows += `
                        <tr>
                            <td style="display: flex; align-items: center; gap: 1.5rem;">
                                <img src="${item.imageUrl}" class="cart-img">
                                <div>
                                    <h4 style="margin: 0; font-size: 1.05rem;">${item.name}</h4>
                                </div>
                            </td>
                            <td style="font-weight: 500;">${item.size}</td>
                            <td style="font-weight: 500;">₹${item.price.toLocaleString('en-IN')}</td>
                            <td>
                                <input type="number" min="1" value="${item.quantity}" style="width: 60px; padding: 0.4rem; border: 1px solid var(--border); border-radius: 5px; text-align: center;" onchange="updateQty(${index}, this.value)">
                            </td>
                            <td style="font-weight: 700;">₹${subtotal.toLocaleString('en-IN')}</td>
                            <td>
                                <button onclick="removeCartItem(${index})" style="background: none; border: none; color: #DC2626; cursor: pointer; text-decoration: underline; font-weight: 600; font-family: inherit;">Remove</button>
                            </td>
                        </tr>
                    `;
                });

                container.innerHTML = `
                    <div class="container">
                        <h2 class="section-title">Your Style Selection</h2>
                        <table class="cart-table">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Size</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Subtotal</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${cartRows}
                            </tbody>
                        </table>

                        <div class="cart-summary">
                            <h3 style="margin-bottom: 1.5rem; font-weight: 700; color: var(--primary);">Order Summary</h3>
                            <div class="summary-row">
                                <span>Subtotal</span>
                                <span>₹${total.toLocaleString('en-IN')}</span>
                            </div>
                            <div class="summary-row">
                                <span>Shipping</span>
                                <span style="color: #10B981; font-weight: 600;">FREE</span>
                            </div>
                            <hr style="border: none; border-top: 1px solid var(--border); margin: 1rem 0;">
                            <div class="summary-row" style="font-weight: 800; font-size: 1.25rem;">
                                <span>Total</span>
                                <span>₹${total.toLocaleString('en-IN')}</span>
                            </div>
                            <a href="#checkout" class="btn" style="width: 100%; text-align: center; margin-top: 1.5rem; border-radius: 50px;">Proceed to Checkout</a>
                        </div>
                    </div>
                `;
            } 
            else if (hash === '#checkout') {
                // Checkout view
                if (cart.length === 0) {
                    window.location.hash = '#home';
                    return;
                }

                let total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);

                container.innerHTML = `
                    <div class="container">
                        <div class="form-container">
                            <h2 class="section-title" style="margin-bottom: 2rem;">Shipping & Checkout</h2>
                            <form id="checkout-form">
                                <div class="form-group">
                                    <label>Full Name</label>
                                    <input type="text" required placeholder="John Doe">
                                </div>
                                <div class="form-group">
                                    <label>Shipping Address</label>
                                    <textarea required rows="3" placeholder="123 Luxury Lane, Green Valley"></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Email Address</label>
                                    <input type="email" required placeholder="johndoe@example.com" value="${user ? user.email : ''}">
                                </div>
                                <div class="form-group">
                                    <label>Payment Method</label>
                                    <select class="variant-select" style="width: 100%; background: var(--background);">
                                        <option value="cod">Cash on Delivery (COD)</option>
                                        <option value="card">Credit / Debit Card</option>
                                    </select>
                                </div>
                                <div style="margin: 2rem 0; font-size: 1.15rem; font-weight: 700; display: flex; justify-content: space-between;">
                                    <span>Total Payable:</span>
                                    <span style="color: var(--accent);">₹${total.toLocaleString('en-IN')}</span>
                                </div>
                                <button type="submit" class="btn" style="width: 100%; border-radius: 50px;">Place Order</button>
                            </form>
                        </div>
                    </div>
                `;

                document.getElementById('checkout-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    cart = [];
                    saveState();
                    window.location.hash = '#order-success';
                });
            } 
            else if (hash === '#order-success') {
                // Success view
                container.innerHTML = `
                    <div class="container" style="text-align: center; padding: 6rem 1rem;">
                        <span style="font-size: 5rem;">🎉</span>
                        <h2 class="section-title" style="margin-top: 1.5rem; margin-bottom: 1rem;">Order Placed Successfully!</h2>
                        <p style="color: var(--text-muted); max-width: 500px; margin: 0 auto 2.5rem; font-size: 1.05rem;">
                            Thank you for shopping at NovaMart. Your style selection is being processed and will ship within 24 hours.
                        </p>
                        <a href="#home" class="btn">Continue Shopping</a>
                    </div>
                `;
            } 
            else if (hash === '#login') {
                // Login view
                container.innerHTML = `
                    <div class="container">
                        <div class="form-container">
                            <h2 class="section-title" style="margin-bottom: 2rem;">Welcome Back</h2>
                            <form id="login-form">
                                <div class="form-group">
                                    <label>Email Address</label>
                                    <input type="email" id="login-email" required placeholder="prajwal@example.com">
                                </div>
                                <div class="form-group">
                                    <label>Password</label>
                                    <input type="password" id="login-password" required placeholder="••••••••">
                                </div>
                                <button type="submit" class="btn" style="width: 100%; border-radius: 50px; margin-top: 1rem;">Login</button>
                                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.95rem;">
                                    Don't have an account? <a href="#register" style="color: var(--accent); font-weight: 600;">Register here</a>
                                </p>
                            </form>
                        </div>
                    </div>
                `;

                document.getElementById('login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const email = document.getElementById('login-email').value;
                    const name = email.split('@')[0];
                    user = { name: name.charAt(0).toUpperCase() + name.slice(1), email: email };
                    saveState();
                    window.location.hash = '#home';
                    renderView();
                });
            } 
            else if (hash === '#register') {
                // Register view
                container.innerHTML = `
                    <div class="container">
                        <div class="form-container">
                            <h2 class="section-title" style="margin-bottom: 2rem;">Create Account</h2>
                            <form id="register-form">
                                <div class="form-group">
                                    <label>Your Name</label>
                                    <input type="text" id="reg-name" required placeholder="Prajwal Yeshyagol">
                                </div>
                                <div class="form-group">
                                    <label>Email Address</label>
                                    <input type="email" id="reg-email" required placeholder="prajwal@example.com">
                                </div>
                                <div class="form-group">
                                    <label>Password</label>
                                    <input type="password" required placeholder="••••••••">
                                </div>
                                <button type="submit" class="btn" style="width: 100%; border-radius: 50px; margin-top: 1rem;">Register</button>
                                <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted); font-size: 0.95rem;">
                                    Already have an account? <a href="#login" style="color: var(--accent); font-weight: 600;">Login here</a>
                                </p>
                            </form>
                        </div>
                    </div>
                `;

                document.getElementById('register-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    user = {
                        name: document.getElementById('reg-name').value,
                        email: document.getElementById('reg-email').value
                    };
                    saveState();
                    window.location.hash = '#home';
                    renderView();
                });
            }
        }

        // Global functions for cart interaction
        window.removeCartItem = function(index) {
            cart.splice(index, 1);
            saveState();
            renderView();
        }

        window.updateQty = function(index, val) {
            const qty = parseInt(val);
            if (qty > 0) {
                cart[index].quantity = qty;
                saveState();
                renderView();
            }
        }

        // Search Handlers
        function executeSearch() {
            const query = document.getElementById('search-input').value.trim();
            if (query) {
                window.location.hash = `#home?search=${encodeURIComponent(query)}`;
            } else {
                window.location.hash = '#home';
            }
        }

        document.getElementById('search-btn').addEventListener('click', executeSearch);
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeSearch();
        });

        // Initialize Router
        window.addEventListener('hashchange', renderView);
        window.addEventListener('DOMContentLoaded', renderView);
    </script>
</body>
</html>
